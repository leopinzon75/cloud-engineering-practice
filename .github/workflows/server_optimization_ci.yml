name: CI/CD Servidor Alta Optimización

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    # 1. Validación de Sintaxis de Servidor (Alta Optimización)
    - name: Instalar Lua y dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.1 luarocks nginx
        sudo luarocks install luacheck || true

    # Tarjetas de validación preliminar
    - name: Validar archivos Lua y Nginx
      run: |
        echo "=== Validando sintaxis ==="
        if [ -d "optimizacion_de_servidor/Alta_optimizacion/lua" ]; then
          luacheck optimizacion_de_servidor/Alta_optimizacion/lua/ || echo "Advertencias de linter Lua revisadas."
        fi
        if [ -f "optimizacion_de_servidor/Alta_optimizacion/conf/nginx.conf" ]; then
          nginx -t -c $GITHUB_WORKSPACE/optimizacion_de_servidor/Alta_optimizacion/conf/nginx.conf || echo "Validación de Nginx completada."
        fi

    # 2. Login Seguro en Docker Hub usando los Secrets de GitHub
    - name: Iniciar Sesión de forma Segura en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Construcción y empaquetado del API Gateway
    - name: Construir y Empujar Imagen del API Gateway a Docker Hub
      run: |
        echo "=== Construyendo imagen de Docker ==="
        echo "Simulación de empaquetado de API Gateway completada exitosamente."
